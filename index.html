<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Copilot LP - Entrevista</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:#0a0e27;
  color:#e0e0e0;
  min-height:100%;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(0,119,182,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(0,180,216,.06) 0%,transparent 50%);
}
.wrap{max-width:560px;margin:0 auto;padding:20px 20px 160px}

/* Header */
.hdr{position:sticky;top:0;z-index:10;background:#0a0e27;padding:16px 0 12px}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr-label{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;color:#546e7a;letter-spacing:1.5px;text-transform:uppercase}
.hdr-count{font-size:13px;color:#546e7a}
.prog{width:100%;height:4px;background:#1a1a2e;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#00b4d8,#0077b6);border-radius:2px;transition:width .5s ease}

/* Intro */
.intro{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px 0}
.intro-icon{font-size:56px;margin-bottom:16px}
.intro-title{font-family:'Outfit',sans-serif;font-size:32px;font-weight:800;color:#e0f7fa;margin-bottom:12px;letter-spacing:-1px}
.intro-sub{font-family:'Outfit',sans-serif;font-size:18px;color:#90caf9;margin-bottom:32px;font-weight:300}
.intro-box{background:rgba(0,180,216,.08);border:1px solid rgba(0,180,216,.2);border-radius:16px;padding:24px 28px;max-width:420px;margin-bottom:40px;text-align:left}
.intro-box p{font-size:15px;color:#b0bec5;line-height:1.7}
.intro-box strong{color:#e0f7fa}

/* Buttons */
.btn-start{font-family:'Outfit',sans-serif;font-size:18px;font-weight:600;background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;border:none;border-radius:14px;padding:16px 48px;cursor:pointer;box-shadow:0 4px 24px rgba(0,119,182,.3)}
.nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,#0a0e27 30%);padding:40px 20px 28px;display:flex;justify-content:center;z-index:20}
.nav-inner{display:flex;gap:12px;width:100%;max-width:560px}
.btn-back{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;background:rgba(255,255,255,.06);color:#90a4ae;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 24px;cursor:pointer}
.btn-next{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;border:none;border-radius:12px;padding:14px 32px;cursor:pointer;flex:1;box-shadow:0 4px 20px rgba(0,119,182,.25)}
.btn-next:disabled{background:#263238;color:#546e7a;cursor:not-allowed;box-shadow:none}
.btn-send{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;background:linear-gradient(135deg,#00c853,#00897b);color:#fff;border:none;border-radius:12px;padding:14px 32px;cursor:pointer;flex:1;box-shadow:0 4px 20px rgba(0,200,83,.25)}
.btn-send:disabled{background:#455a64;opacity:.7;cursor:wait;box-shadow:none}

/* Block header */
.blk-hdr{margin-bottom:32px;padding-top:8px}
.blk-badge{display:inline-flex;align-items:center;background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.2);border-radius:10px;padding:6px 14px;margin-bottom:14px}
.blk-badge span{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:#00b4d8}
.blk-title{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;color:#e0f7fa;margin-bottom:6px;letter-spacing:-.5px}
.blk-sub{font-size:15px;color:#78909c}

/* Fields */
.field{margin-bottom:28px}
.field label{font-size:15px;font-weight:600;color:#e0f7fa;display:block;margin-bottom:8px;line-height:1.5}
.field .req{color:#ef5350;margin-left:4px}
.field input,.field textarea{
  width:100%;font-family:'DM Sans',sans-serif;font-size:15px;
  background:rgba(255,255,255,.04);color:#e0e0e0;
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  padding:14px 16px;outline:none;transition:border-color .2s,background .2s;line-height:1.6
}
.field textarea{resize:none;overflow:hidden;min-height:80px}
.field input:focus,.field textarea:focus{border-color:#00b4d8;background:rgba(0,180,216,.05)}
.field input::placeholder,.field textarea::placeholder{color:#546e7a}

/* Success */
.success{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px 0}
.success-icon{font-size:64px;margin-bottom:20px}
.success-title{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:#e0f7fa;margin-bottom:12px}
.success-text{font-size:16px;color:#90caf9;margin-bottom:32px;max-width:380px;line-height:1.6}
.success-box{background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.25);border-radius:14px;padding:20px 24px;max-width:360px}
.success-box p{font-size:14px;color:#a5d6a7;line-height:1.6}

.hidden{display:none}
</style>
</head>
<body>

<div class="wrap" id="wrap">

  <!-- HEADER (sticky) -->
  <div class="hdr" id="hdr">
    <div class="hdr-row">
      <span class="hdr-label">Copilot LP</span>
      <span class="hdr-count" id="counter"></span>
    </div>
    <div class="prog"><div class="prog-fill" id="progbar" style="width:0%"></div></div>
  </div>

  <!-- ALL PAGES -->
  <div id="pages"></div>

</div>

<!-- NAV BAR -->
<div class="nav hidden" id="navbar">
  <div class="nav-inner">
    <button class="btn-back" id="btnBack" onclick="prev()">&#8592; Voltar</button>
    <button class="btn-next" id="btnNext" onclick="next()">Pr&#243;ximo &#8594;</button>
  </div>
</div>

<script>
// === CONFIG ===
var SU_URL = 'https://tgijwodbzdtcatqkxfxl.supabase.co';
var SU_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnaWp3b2RiemR0Y2F0cWt4ZnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTk4NTksImV4cCI6MjA4ODkzNTg1OX0.uqfn2ieN36QXjesQAJAaPMxfiAludDO3nIs52JLHnO4';

// === BLOCKS DATA ===
var blocks = [
  {id:'intro', icon:'', title:'', fields:[]},
  {id:'ctx', icon:'01', title:'Contexto Geral', sub:'Sobre voce e sua operacao', fields:[
    {k:'interviewee_name',l:'Seu nome',p:'Ex: Filipe',t:'input',rq:1},
    {k:'tempo_lifeplanner',l:'Ha quanto tempo voce e LifePlanner da Prudential?',p:'Ex: 5 anos',t:'input'},
    {k:'clientes_ativos',l:'Quantos clientes ativos voce tem hoje na carteira?',p:'Numero de clientes e apolices',t:'ta'},
    {k:'meta_mensal',l:'Qual e a sua meta mensal? (vendas novas + renovacoes)',p:'Descreva sua meta',t:'ta'},
    {k:'ferramentas_sistemas',l:'Quais ferramentas/sistemas voce usa no dia a dia?',p:'Sistema Prudential, WhatsApp, planilhas, agenda, CRM...',t:'ta'},
    {k:'equipe_assessora',l:'Voce trabalha sozinho ou tem equipe? Fale sobre sua assessora.',p:'Quanto paga? Quantas horas? O que ela faz exatamente?',t:'ta'}
  ]},
  {id:'rot', icon:'02', title:'Rotina Diaria', sub:'Como e o seu dia real de trabalho', fields:[
    {k:'dia_tipico',l:'Descreva seu dia de ontem (ou ultimo dia util) do inicio ao fim.',p:'Hora a hora: o que fez, quanto tempo levou...',t:'ta'},
    {k:'reunioes_por_semana',l:'Quantas reunioes com clientes/prospects voce faz por semana?',p:'Diferencie: reunioes de venda vs. manutencao/pos-venda',t:'ta'},
    {k:'preparacao_reuniao',l:'O que voce faz ANTES de uma reuniao com cliente?',p:'Quanto tempo leva? Onde busca informacoes?',t:'ta'},
    {k:'pos_reuniao',l:'E DEPOIS da reuniao? O que acontece?',p:'Anota onde? Manda e-mail? WhatsApp? Quem faz o follow-up?',t:'ta'},
    {k:'percentual_administrativo',l:'Quanto do seu dia e gasto com coisas que NAO sao conversar com cliente?',p:'Estime um percentual e diga quais tarefas',t:'ta'}
  ]},
  {id:'pv', icon:'03', title:'Pos-venda e Sinistros', sub:'Backoffice e atendimento ao cliente', fields:[
    {k:'processo_sinistro',l:'Quando um cliente precisa acionar o seguro (sinistro), como funciona hoje?',p:'Quem ele procura? O que voce faz? Quanto tempo leva?',t:'ta'},
    {k:'sinistros_por_mes',l:'Quantos sinistros voce acompanha por mes em media?',p:'De quais tipos? (morte, doenca grave, invalidez, cirurgia...)',t:'ta'},
    {k:'problemas_sinistro',l:'Quais sao os maiores problemas no processo de sinistro?',p:'Documentos faltando? Demora? Falta de visibilidade?',t:'ta'},
    {k:'demandas_pos_venda',l:'Alem de sinistros, quais outras demandas de pos-venda os clientes trazem?',p:'Alteracao de beneficiario, pagamento, reabilitacao, duvidas, IR...',t:'ta'},
    {k:'divisao_assessora',l:'Dessas demandas, quais a assessora resolve e quais so voce pode fazer?',p:'Descreva a divisao de trabalho',t:'ta'},
    {k:'perda_cliente',l:'Ja perdeu cliente por falta de acompanhamento ou demora?',p:'Se sim, conte o caso. Qual foi o impacto?',t:'ta'},
    {k:'controle_renovacoes',l:'Como voce controla quais coberturas estao vencendo?',p:'Planilha? Memoria? Alerta do sistema?',t:'ta'}
  ]},
  {id:'vd', icon:'04', title:'Vendas e Prospeccao', sub:'Funil de vendas e conversao', fields:[
    {k:'origem_clientes',l:'De onde vem os seus novos clientes?',p:'Indicacoes? Redes sociais? Eventos? Base fria?',t:'ta'},
    {k:'processo_venda',l:'Do primeiro contato ate fechar a venda, como funciona?',p:'Quantas reunioes? Quanto tempo? O que trava?',t:'ta'},
    {k:'escolha_produto',l:'Como voce decide qual produto recomendar para cada cliente?',p:'Simulacao no sistema? Calcula na cabeca? Planilha?',t:'ta'},
    {k:'prospects_ativos',l:'Quantos prospects voce esta acompanhando que ainda nao fecharam?',p:'Como controla isso?',t:'ta'},
    {k:'taxa_conversao',l:'Qual sua taxa de conversao aproximada? De cada 10, quantos fecham?',p:'Estimativa',t:'input'}
  ]},
  {id:'pr', icon:'05', title:'Conhecimento de Produtos', sub:'Seguranca sobre os produtos Prudential', fields:[
    {k:'seguranca_produtos',l:'Voce se sente seguro para explicar todos os detalhes dos produtos Prudential?',p:'Carencias, exclusoes, resgate, faixas etarias...',t:'ta'},
    {k:'duvida_resposta',l:'Quando um cliente faz uma pergunta que voce nao sabe responder, o que faz?',p:'Liga pra Prudential? Consulta condicoes gerais?',t:'ta'},
    {k:'atualizacao_produtos',l:'Quando lanca produto novo ou muda regras, como fica sabendo?',p:'Treinamento? E-mail? Comunicacao do MFB?',t:'ta'}
  ]},
  {id:'fn', icon:'06', title:'Gestao Financeira', sub:'Controle do negocio', fields:[
    {k:'controle_comissoes',l:'Como voce controla suas comissoes e receitas?',p:'Planilha? Sistema? A assessora faz?',t:'ta'},
    {k:'controle_despesas',l:'E o controle de despesas do negocio?',p:'Gasolina, almocos, assessora, materiais...',t:'ta'},
    {k:'custo_por_venda',l:'Voce sabe quanto custa cada venda? Quanto gasta para fechar um cliente?',p:'Se nao sabe, tudo bem - diga isso',t:'ta'},
    {k:'custo_assessora',l:'Quanto paga por mes para a assessora? E quantas horas ela trabalha?',p:'Valor em R$ e carga horaria',t:'input'}
  ]},
  {id:'ds', icon:'07', title:'Frustracoes e Desejos', sub:'O que realmente importa para voce', fields:[
    {k:'tarefa_eliminar',l:'Se pudesse eliminar UMA tarefa da sua rotina para sempre, qual seria?',p:'Pense na que mais consome tempo ou energia',t:'ta'},
    {k:'frustracao_sistema',l:'O que mais te frustra no sistema/processo da Prudential?',p:'Seja honesto - isso ajuda a construir algo melhor',t:'ta'},
    {k:'assistente_perfeito',l:'Se voce tivesse um assistente perfeito 24h, o que pediria pra ele fazer?',p:'Liste tudo que vier a cabeca, sem filtro',t:'ta'},
    {k:'lp_produtivo',l:'Conhece algum LifePlanner muito mais produtivo? O que ele faz de diferente?',p:'Processos, ferramentas, atitude...',t:'ta'},
    {k:'willingness_to_pay',l:'Se existisse uma ferramenta que automatizasse seu backoffice, quanto pagaria por mes?',p:'Valor em R$ - seja sincero',t:'input'},
    {k:'indicaria_ferramenta',l:'Indicaria essa ferramenta para outros LPs? Quantos conhece que teriam interesse?',p:'Numero aproximado de LPs na sua rede',t:'ta'}
  ]},
  {id:'nt', icon:'08', title:'Notas Finais', sub:'Algo mais que queira compartilhar', fields:[
    {k:'notas_gerais',l:'Espaco livre - tem algo mais que gostaria de dizer ou que nao foi perguntado?',p:'Fique a vontade...',t:'ta'}
  ]}
];

var step = 0;
var total = blocks.length;
var data = {};

// === BUILD ALL PAGES ON LOAD ===
function buildPages() {
  var pages = document.getElementById('pages');
  var html = '';

  // Intro page
  html += '<div class="page" id="page-0">';
  html += '<div class="intro">';
  html += '<div class="intro-icon">&#127919;</div>';
  html += '<h1 class="intro-title">Copilot LP</h1>';
  html += '<p class="intro-sub">Entrevista de Descoberta para LifePlanners</p>';
  html += '<div class="intro-box"><p>';
  html += 'Este formulario faz parte de um estudo para criar uma ferramenta que ajude LifePlanners a trabalhar melhor &mdash; menos burocracia, mais tempo com o cliente.';
  html += '<br><br><strong>Duracao:</strong> 15-25 minutos';
  html += '<br><strong>Blocos:</strong> 8 secoes tematicas';
  html += '<br><br>Nao tem resposta certa ou errada. Quanto mais honesto voce for, melhor o que vamos construir.';
  html += '</p></div>';
  html += '<button class="btn-start" onclick="next()">Comecar &#8594;</button>';
  html += '</div></div>';

  // Question pages
  for (var i = 1; i < blocks.length; i++) {
    var b = blocks[i];
    html += '<div class="page hidden" id="page-' + i + '">';
    html += '<div class="blk-hdr">';
    html += '<div class="blk-badge"><span>' + b.icon + '</span></div>';
    html += '<h2 class="blk-title">' + b.title + '</h2>';
    html += '<p class="blk-sub">' + b.sub + '</p>';
    html += '</div>';

    for (var j = 0; j < b.fields.length; j++) {
      var f = b.fields[j];
      html += '<div class="field">';
      html += '<label>' + f.l;
      if (f.rq) html += '<span class="req">*</span>';
      html += '</label>';
      if (f.t === 'ta') {
        html += '<textarea id="f-' + f.k + '" placeholder="' + f.p + '" rows="3" oninput="saveField(\'' + f.k + '\',this)"></textarea>';
      } else {
        html += '<input type="text" id="f-' + f.k + '" placeholder="' + f.p + '" oninput="saveField(\'' + f.k + '\',this)">';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // Success page
  html += '<div class="page hidden" id="page-success">';
  html += '<div class="success">';
  html += '<div class="success-icon">&#9989;</div>';
  html += '<h1 class="success-title">Respostas enviadas!</h1>';
  html += '<p class="success-text">Muito obrigado pela sua participacao. Suas respostas vao nos ajudar a construir algo que realmente faca diferenca no dia a dia dos LifePlanners.</p>';
  html += '<div class="success-box"><p>Em breve entraremos em contato com os proximos passos. Pode fechar esta pagina.</p></div>';
  html += '</div></div>';

  pages.innerHTML = html;

  // Auto-grow textareas
  var tas = document.querySelectorAll('textarea');
  for (var x = 0; x < tas.length; x++) {
    tas[x].addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });
  }
}

function saveField(key, el) {
  data[key] = el.value;
}

function showPage(n) {
  var allPages = document.querySelectorAll('.page');
  for (var i = 0; i < allPages.length; i++) {
    allPages[i].classList.add('hidden');
  }
  var target = document.getElementById('page-' + n);
  if (target) target.classList.remove('hidden');

  // Update progress
  var pct = (n / (total - 1)) * 100;
  document.getElementById('progbar').style.width = pct + '%';

  // Update counter
  var cnt = document.getElementById('counter');
  if (n > 0) {
    var answered = 0;
    var totalFields = 0;
    for (var i = 1; i < blocks.length; i++) {
      for (var j = 0; j < blocks[i].fields.length; j++) {
        totalFields++;
        var k = blocks[i].fields[j].k;
        if (data[k] && data[k].trim()) answered++;
      }
    }
    cnt.textContent = answered + '/' + totalFields + ' respondidas';
  } else {
    cnt.textContent = '';
  }

  // Show/hide nav
  var nav = document.getElementById('navbar');
  if (n === 0) {
    nav.classList.add('hidden');
  } else {
    nav.classList.remove('hidden');
    var btnNext = document.getElementById('btnNext');
    if (n === total - 1) {
      btnNext.textContent = '✓ Enviar Respostas';
      btnNext.className = 'btn-send';
      btnNext.onclick = submit;
    } else {
      btnNext.textContent = 'Proximo →';
      btnNext.className = 'btn-next';
      btnNext.onclick = next;
    }
  }

  window.scrollTo(0, 0);
}

function next() {
  if (step < total - 1) {
    step++;
    showPage(step);
  }
}

function prev() {
  if (step > 1) {
    step--;
    showPage(step);
  }
}

function submit() {
  var btn = document.getElementById('btnNext');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  var payload = {};
  for (var key in data) {
    if (data.hasOwnProperty(key)) {
      payload[key] = data[key];
    }
  }
  payload.interview_date = new Date().toISOString().slice(0, 10);
  if (!payload.interviewee_name) payload.interviewee_name = 'Anonimo';

  fetch(SU_URL + '/rest/v1/interview_responses', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SU_KEY,
      'Authorization': 'Bearer ' + SU_KEY,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(payload)
  })
  .then(function(res) {
    if (!res.ok) throw new Error('Erro');
    // Show success
    var allPages = document.querySelectorAll('.page');
    for (var i = 0; i < allPages.length; i++) allPages[i].classList.add('hidden');
    document.getElementById('page-success').classList.remove('hidden');
    document.getElementById('navbar').classList.add('hidden');
    document.getElementById('progbar').style.width = '100%';
    document.getElementById('counter').textContent = 'Concluido!';
  })
  .catch(function() {
    alert('Erro ao enviar. Verifique sua conexao e tente novamente.');
    btn.disabled = false;
    btn.textContent = '✓ Enviar Respostas';
  });
}

// INIT
buildPages();
showPage(0);
</script>
</body>
</html>
